name: Refresh Cloudflare Pages

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Cloudflare deployment
        run: |
          if [ -z "${{ secrets.CLOUDFLARE_DEPLOY_HOOK_URL }}" ]; then
            echo "Missing CLOUDFLARE_DEPLOY_HOOK_URL secret."
            exit 1
          fi
          curl -X POST "${{ secrets.CLOUDFLARE_DEPLOY_HOOK_URL }}"
