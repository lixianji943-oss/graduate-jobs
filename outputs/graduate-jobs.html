<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>应届生岗位信息库</title>
  <style>
    :root {
      --bg: #f6f7f9;
      --panel: #ffffff;
      --ink: #20242a;
      --muted: #68707d;
      --line: #d9dee7;
      --brand: #16695c;
      --brand-dark: #0f4f45;
      --blue: #265f9f;
      --amber: #9a5b12;
      --red: #a33434;
      --green: #16714b;
      --shadow: 0 10px 24px rgba(28, 36, 48, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      color: var(--ink);
      background: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      line-height: 1.5;
    }

    button,
    input,
    select {
      font: inherit;
    }

    a {
      color: inherit;
    }

    .page {
      min-height: 100vh;
    }

    .topbar {
      background: #fff;
      border-bottom: 1px solid var(--line);
    }

    .topbar-inner {
      max-width: 1180px;
      margin: 0 auto;
      padding: 28px 24px 24px;
      display: grid;
      gap: 18px;
    }

    .title-row {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 24px;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 4vw, 42px);
      line-height: 1.12;
      letter-spacing: 0;
    }

    .subtitle {
      max-width: 680px;
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 15px;
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
    }

    .primary-link,
    .ghost-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 38px;
      border-radius: 8px;
      padding: 0 14px;
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
    }

    .primary-link {
      color: #fff;
      background: var(--brand);
    }

    .primary-link:hover {
      background: var(--brand-dark);
    }

    .ghost-link {
      border: 1px solid var(--line);
      color: var(--ink);
      background: #fff;
    }

    .ghost-link:hover {
      border-color: #aeb7c5;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(3, minmax(86px, 1fr));
      gap: 10px;
      min-width: 310px;
    }

    .metric {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 12px;
      background: #fbfcfd;
    }

    .metric strong {
      display: block;
      font-size: 22px;
      line-height: 1.15;
    }

    .metric span {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-size: 12px;
    }

    main {
      max-width: 1180px;
      margin: 0 auto;
      padding: 22px 24px 46px;
    }

    .notice {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: center;
      margin-bottom: 16px;
      border: 1px solid #cfded9;
      border-radius: 8px;
      padding: 14px 16px;
      background: #f1f8f5;
    }

    .notice strong {
      display: block;
      margin-bottom: 2px;
      color: var(--brand-dark);
      font-size: 15px;
    }

    .notice span {
      color: #53605c;
      font-size: 13px;
    }

    .filters {
      display: grid;
      grid-template-columns: 1.6fr repeat(5, 1fr);
      gap: 12px;
      align-items: end;
      margin-bottom: 16px;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
    }

    input,
    select {
      width: 100%;
      height: 40px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 11px;
      color: var(--ink);
      background: #fff;
      outline: none;
    }

    input:focus,
    select:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(22, 105, 92, 0.12);
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
      color: var(--muted);
      font-size: 14px;
    }

    .toolbar-actions {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-end;
    }

    .view-tabs {
      display: inline-flex;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: #fff;
    }

    .view-tab {
      height: 34px;
      border: 0;
      border-right: 1px solid var(--line);
      padding: 0 12px;
      color: var(--muted);
      background: #fff;
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
    }

    .view-tab:last-child {
      border-right: 0;
    }

    .view-tab.active {
      color: #fff;
      background: var(--brand);
    }

    .reset {
      height: 34px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 12px;
      color: var(--ink);
      background: #fff;
      cursor: pointer;
    }

    .reset:hover {
      border-color: #aeb7c5;
    }

    .table-shell {
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .jobs-table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    th,
    td {
      padding: 14px 12px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
    }

    th {
      color: #4d5663;
      background: #f9fafc;
      font-size: 12px;
      font-weight: 700;
    }

    tr:last-child td {
      border-bottom: 0;
    }

    tbody tr {
      cursor: pointer;
    }

    tbody tr:hover {
      background: #fbfcfd;
    }

    .company {
      font-weight: 700;
    }

    .role {
      color: var(--brand-dark);
      font-weight: 700;
    }

    .muted {
      color: var(--muted);
      font-size: 13px;
    }

    .tagline {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 7px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      border: 1px solid #dce3ea;
      border-radius: 999px;
      padding: 2px 8px;
      color: #47515f;
      background: #f7f9fb;
      font-size: 12px;
      white-space: nowrap;
    }

    .status {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      border-radius: 999px;
      padding: 3px 9px;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .status.open {
      color: var(--green);
      background: #e9f6f0;
    }

    .status.soon {
      color: var(--amber);
      background: #fff4df;
    }

    .status.closed {
      color: var(--red);
      background: #fbe9e9;
    }

    .apply {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 88px;
      height: 34px;
      border-radius: 8px;
      color: #fff;
      background: var(--brand);
      font-size: 13px;
      font-weight: 700;
      text-decoration: none;
    }

    .apply:hover {
      background: var(--brand-dark);
    }

    .favorite {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 88px;
      height: 34px;
      border: 1px solid #cfd7e2;
      border-radius: 8px;
      padding: 0 10px;
      color: #45505d;
      background: #fff;
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
    }

    .favorite:hover {
      border-color: #aeb7c5;
    }

    .favorite.saved {
      border-color: #f0c36b;
      color: #7b520e;
      background: #fff7e5;
    }

    .row-actions {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
    }

    .empty {
      padding: 42px 20px;
      color: var(--muted);
      text-align: center;
    }

    .mobile-list {
      display: none;
      gap: 10px;
    }

    .job-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      background: #fff;
      box-shadow: 0 7px 18px rgba(28, 36, 48, 0.06);
      cursor: pointer;
    }

    .card-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
    }

    .card-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-top: 12px;
    }

    .card-buttons {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-end;
    }

    dialog {
      width: min(760px, calc(100vw - 28px));
      max-height: min(82vh, 760px);
      border: 0;
      border-radius: 8px;
      padding: 0;
      color: var(--ink);
      box-shadow: 0 24px 70px rgba(14, 20, 30, 0.26);
    }

    dialog::backdrop {
      background: rgba(18, 25, 35, 0.48);
    }

    .modal {
      display: grid;
      max-height: min(82vh, 760px);
      grid-template-rows: auto 1fr auto;
      background: #fff;
    }

    .modal-head {
      padding: 22px 24px 16px;
      border-bottom: 1px solid var(--line);
    }

    .modal-title-row {
      display: flex;
      justify-content: space-between;
      gap: 16px;
    }

    .modal h2 {
      margin: 4px 0 0;
      font-size: 25px;
      line-height: 1.22;
      letter-spacing: 0;
    }

    .close {
      width: 36px;
      height: 36px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      cursor: pointer;
      font-size: 20px;
      line-height: 1;
    }

    .modal-body {
      overflow: auto;
      padding: 20px 24px 8px;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 18px;
    }

    .detail {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 12px;
      background: #fbfcfd;
    }

    .detail span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .detail strong {
      display: block;
      margin-top: 4px;
      font-size: 14px;
    }

    .section {
      margin: 0 0 18px;
    }

    .section h3 {
      margin: 0 0 8px;
      font-size: 16px;
    }

    .section ul {
      margin: 0;
      padding-left: 19px;
      color: #38414d;
    }

    .section li + li {
      margin-top: 6px;
    }

    .source-line {
      color: var(--muted);
      font-size: 13px;
    }

    .modal-foot {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 24px 20px;
      border-top: 1px solid var(--line);
    }

    .secondary {
      height: 38px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 13px;
      background: #fff;
      cursor: pointer;
    }

    @media (max-width: 980px) {
      .title-row {
        align-items: stretch;
        flex-direction: column;
      }

      .metrics {
        min-width: 0;
      }

      .filters {
        grid-template-columns: repeat(2, 1fr);
      }

      .filters .field:first-child {
        grid-column: 1 / -1;
      }
    }

    @media (max-width: 760px) {
      .topbar-inner,
      main {
        padding-left: 16px;
        padding-right: 16px;
      }

      .metrics {
        grid-template-columns: repeat(3, 1fr);
      }

      .metric {
        padding: 9px;
      }

      .metric strong {
        font-size: 19px;
      }

      .filters {
        grid-template-columns: 1fr;
      }

      .notice {
        grid-template-columns: 1fr;
      }

      .table-shell {
        display: none;
      }

      .mobile-list {
        display: grid;
      }

      .detail-grid {
        grid-template-columns: 1fr;
      }

      .modal-foot {
        align-items: stretch;
        flex-direction: column;
      }

      .modal-foot .apply,
      .modal-foot .favorite,
      .modal-foot .secondary {
        width: 100%;
      }

      .modal-foot .row-actions {
        width: 100%;
      }

      .modal-foot .row-actions > * {
        flex: 1;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="topbar">
      <div class="topbar-inner">
        <div class="title-row">
          <div>
            <h1>应届生岗位信息库</h1>
            <p class="subtitle">收录同学提交与官方来源核验过的岗位，按城市、企业性质、岗位类型、学历和截止时间快速筛选。</p>
            <div class="hero-actions">
              <a class="primary-link" href="https://yal2at57cvq.feishu.cn/base/GtSLbyyR3aCENOsJYC6cdlsVnih?from=from_copylink" target="_blank" rel="noopener noreferrer">提交岗位</a>
              <a class="ghost-link" href="https://yal2at57cvq.feishu.cn/base/GtSLbyyR3aCENOsJYC6cdlsVnih?from=from_copylink" target="_blank" rel="noopener noreferrer">打开飞书表格</a>
            </div>
          </div>
          <div class="metrics" aria-label="岗位概览">
            <div class="metric">
              <strong id="metricTotal">0</strong>
              <span>收录岗位</span>
            </div>
            <div class="metric">
              <strong id="metricOpen">0</strong>
              <span>可投递</span>
            </div>
            <div class="metric">
              <strong id="metricSoon">0</strong>
              <span>即将截止</span>
            </div>
          </div>
        </div>
      </div>
    </header>

    <main>
      <section class="notice" aria-label="岗位收录说明">
        <div>
          <strong>零预算收录流程</strong>
          <span>岗位先提交到飞书表格，审核通过后再展示到网站；建议只收官方招聘系统、企业官网、学校就业网和官方公告链接。</span>
          <span id="syncStatus" style="display:block; margin-top:4px;">数据源：正在检查外部岗位数据...</span>
        </div>
        <a class="ghost-link" href="https://yal2at57cvq.feishu.cn/base/GtSLbyyR3aCENOsJYC6cdlsVnih?from=from_copylink" target="_blank" rel="noopener noreferrer">去表格审核</a>
      </section>

      <section class="filters" aria-label="岗位筛选">
        <div class="field">
          <label for="keyword">关键词</label>
          <input id="keyword" type="search" placeholder="搜索企业、岗位、专业或职责">
        </div>
        <div class="field">
          <label for="city">工作地点</label>
          <select id="city">
            <option value="">全部</option>
          </select>
        </div>
        <div class="field">
          <label for="nature">企业性质</label>
          <select id="nature">
            <option value="">全部</option>
          </select>
        </div>
        <div class="field">
          <label for="type">岗位类型</label>
          <select id="type">
            <option value="">全部</option>
          </select>
        </div>
        <div class="field">
          <label for="degree">学历要求</label>
          <select id="degree">
            <option value="">全部</option>
          </select>
        </div>
        <div class="field">
          <label for="status">投递状态</label>
          <select id="status">
            <option value="">全部</option>
          </select>
        </div>
      </section>

      <div class="toolbar">
        <span id="resultCount">正在显示 0 个岗位</span>
        <div class="toolbar-actions">
          <div class="view-tabs" aria-label="岗位视图">
            <button class="view-tab active" id="allJobsView" type="button">全部岗位</button>
            <button class="view-tab" id="favoritesView" type="button">我的收藏 <span id="favoriteCount">0</span></button>
          </div>
          <button class="reset" id="resetFilters" type="button">重置筛选</button>
        </div>
      </div>

      <section class="table-shell" aria-label="岗位列表">
        <table class="jobs-table">
          <colgroup>
            <col style="width: 20%;">
            <col style="width: 24%;">
            <col style="width: 13%;">
            <col style="width: 14%;">
            <col style="width: 13%;">
            <col style="width: 16%;">
          </colgroup>
          <thead>
            <tr>
              <th>企业</th>
              <th>岗位</th>
              <th>地点</th>
              <th>要求</th>
              <th>截止</th>
              <th>投递</th>
            </tr>
          </thead>
          <tbody id="jobsBody"></tbody>
        </table>
        <div class="empty" id="emptyTable" hidden>没有匹配的岗位，换一个筛选条件试试。</div>
      </section>

      <section class="mobile-list" id="mobileList" aria-label="移动端岗位列表"></section>
    </main>
  </div>

  <dialog id="jobDialog">
    <article class="modal">
      <header class="modal-head">
        <div class="modal-title-row">
          <div>
            <div class="company" id="modalCompany"></div>
            <h2 id="modalRole"></h2>
          </div>
          <button class="close" id="closeDialog" type="button" aria-label="关闭">×</button>
        </div>
        <div class="tagline" id="modalTags"></div>
      </header>
      <div class="modal-body">
        <div class="detail-grid" id="modalDetails"></div>
        <section class="section">
          <h3>岗位职责</h3>
          <ul id="modalResponsibilities"></ul>
        </section>
        <section class="section">
          <h3>任职要求</h3>
          <ul id="modalRequirements"></ul>
        </section>
        <section class="section">
          <h3>薪资与福利</h3>
          <p class="source-line" id="modalSalary"></p>
        </section>
        <section class="section">
          <h3>信息来源</h3>
          <p class="source-line" id="modalSource"></p>
        </section>
      </div>
      <footer class="modal-foot">
        <button class="secondary" id="closeFooter" type="button">返回列表</button>
        <div class="row-actions">
          <button class="favorite" id="modalFavorite" type="button">收藏岗位</button>
          <a class="apply" id="modalApply" href="#" target="_blank" rel="noopener noreferrer">官方投递</a>
        </div>
      </footer>
    </article>
  </dialog>

    const els = {
      keyword: document.querySelector("#keyword"),
      city: document.querySelector("#city"),
      nature: document.querySelector("#nature"),
      type: document.querySelector("#type"),
      degree: document.querySelector("#degree"),
      status: document.querySelector("#status"),
      jobsBody: document.querySelector("#jobsBody"),
      mobileList: document.querySelector("#mobileList"),
      emptyTable: document.querySelector("#emptyTable"),
      resultCount: document.querySelector("#resultCount"),
      allJobsView: document.querySelector("#allJobsView"),
      favoritesView: document.querySelector("#favoritesView"),
      favoriteCount: document.querySelector("#favoriteCount"),
      syncStatus: document.querySelector("#syncStatus"),
      metricTotal: document.querySelector("#metricTotal"),
      metricOpen: document.querySelector("#metricOpen"),
      metricSoon: document.querySelector("#metricSoon"),
      resetFilters: document.querySelector("#resetFilters"),
      dialog: document.querySelector("#jobDialog"),
      closeDialog: document.querySelector("#closeDialog"),
      closeFooter: document.querySelector("#closeFooter"),
      modalCompany: document.querySelector("#modalCompany"),
      modalRole: document.querySelector("#modalRole"),
      modalTags: document.querySelector("#modalTags"),
      modalDetails: document.querySelector("#modalDetails"),
      modalResponsibilities: document.querySelector("#modalResponsibilities"),
      modalRequirements: document.querySelector("#modalRequirements"),
      modalSalary: document.querySelector("#modalSalary"),
      modalSource: document.querySelector("#modalSource"),
      modalFavorite: document.querySelector("#modalFavorite"),
      modalApply: document.querySelector("#modalApply")
    };

    const filterFields = ["city", "nature", "type", "degree", "status"];
    const statusClass = {
      "可投递": "open",
      "即将截止": "soon",
      "已截止": "closed"
    };

    function uniqueValues(key) {
      return [...new Set(jobs.map((job) => job[key]))].sort((a, b) => a.localeCompare(b, "zh-CN"));
    }

    function fillSelect(select, values) {
      select.querySelectorAll("option:not(:first-child)").forEach((option) => option.remove());
      values.forEach((value) => {
        const option = document.createElement("option");
        option.value = value;
        option.textContent = value;
        select.appendChild(option);
      });
    }

    function makeStatus(status) {
      return `<span class="status ${statusClass[status] || "open"}">${status}</span>`;
    }

    function loadFavoriteIds() {
      try {
        const saved = JSON.parse(localStorage.getItem(FAVORITES_KEY) || "[]");
        return new Set(Array.isArray(saved) ? saved : []);
      } catch (error) {
        return new Set();
      }
    }

    function saveFavoriteIds() {
      localStorage.setItem(FAVORITES_KEY, JSON.stringify([...favoriteIds]));
    }

    function getJobKey(job) {
      return String(job.id || job.link || `${job.company}-${job.role}-${job.city}`);
    }

    function isFavorite(job) {
      return favoriteIds.has(getJobKey(job));
    }

    function favoriteLabel(job) {
      return isFavorite(job) ? "已收藏" : "收藏岗位";
    }

    function favoriteClass(job) {
      return isFavorite(job) ? "favorite saved" : "favorite";
    }

    function updateFavoriteCount() {
      const validIds = new Set(jobs.map(getJobKey));
      favoriteIds = new Set([...favoriteIds].filter((id) => validIds.has(id)));
      saveFavoriteIds();
      els.favoriteCount.textContent = favoriteIds.size;
    }

    function toggleFavorite(job) {
      const key = getJobKey(job);
      if (favoriteIds.has(key)) {
        favoriteIds.delete(key);
      } else {
        favoriteIds.add(key);
      }

      saveFavoriteIds();
      updateFavoriteCount();
      renderJobs();
      updateModalFavorite(job);
    }

    function setActiveView(view) {
      activeView = view;
      els.allJobsView.classList.toggle("active", view === "all");
      els.favoritesView.classList.toggle("active", view === "favorites");
      renderJobs();
    }

    function normalizeJob(raw, index) {
      const deadline = raw.deadline || raw["截止时间"] || "";
      const today = new Date().toISOString().slice(0, 10);
      const autoStatus = deadline && deadline < today ? "已截止" : "可投递";

      return {
        id: raw.id || raw.record_id || index + 1,
        company: raw.company || raw["企业名称"] || "未填写企业",
        nature: raw.nature || raw["企业性质"] || "未公开",
        role: raw.role || raw["工作岗位"] || raw["岗位名称"] || "未填写岗位",
        type: raw.type || raw["岗位类型"] || "未分类",
        city: raw.city || raw["工作地点"] || raw["城市"] || "未公开",
        degree: raw.degree || raw["学历要求"] || "未公开",
        major: raw.major || raw["专业要求"] || "未公开",
        target: raw.target || raw["招聘对象"] || "应届生",
        deadline,
        status: raw.status || raw["投递状态"] || autoStatus,
        salary: raw.salary || raw["薪资范围"] || raw["薪资与福利"] || "未公开",
        source: raw.source || raw["信息来源"] || "待核验来源",
        updated: raw.updated || raw["更新时间"] || today,
        link: raw.link || raw["官方投递网页"] || raw["官方投递链接"] || "#",
        responsibilities: Array.isArray(raw.responsibilities)
          ? raw.responsibilities
          : String(raw.responsibilities || raw["岗位职责"] || "未公开").split(/\n|；|;/).filter(Boolean),
        requirements: Array.isArray(raw.requirements)
          ? raw.requirements
          : String(raw.requirements || raw["任职要求"] || "未公开").split(/\n|；|;/).filter(Boolean)
      };
    }

    async function loadExternalJobs() {
      try {
        const response = await fetch(DATA_ENDPOINT, { cache: "no-store" });
        if (!response.ok) throw new Error("external data not found");
        const payload = await response.json();
        const records = Array.isArray(payload) ? payload : payload.jobs;
        if (!Array.isArray(records)) throw new Error("invalid data shape");
        jobs = records.map(normalizeJob);
        els.syncStatus.textContent = `数据源：已加载外部岗位数据，共 ${jobs.length} 条。`;
      } catch (error) {
        els.syncStatus.textContent = "数据源：暂未连接飞书同步，当前展示示例数据。";
      }
    }

    function makeTags(job) {
      return [job.nature, job.type, job.degree, job.target, job.major]
        .map((tag) => `<span class="tag">${tag}</span>`)
        .join("");
    }

    function jobMatches(job) {
      const keyword = els.keyword.value.trim().toLowerCase();
      const searchable = [
        job.company,
        job.role,
        job.city,
        job.nature,
        job.type,
        job.degree,
        job.major,
        job.target,
        job.responsibilities.join(" "),
        job.requirements.join(" ")
      ].join(" ").toLowerCase();

      if (keyword && !searchable.includes(keyword)) return false;
      return filterFields.every((field) => !els[field].value || job[field] === els[field].value);
    }

    function renderJobs() {
      const baseJobs = activeView === "favorites" ? jobs.filter(isFavorite) : jobs;
      const filtered = baseJobs.filter(jobMatches);
      const visibleJobs = filtered.slice(0, MAX_RENDERED_JOBS);
      els.jobsBody.innerHTML = "";
      els.mobileList.innerHTML = "";
      els.emptyTable.hidden = filtered.length > 0;
      els.emptyTable.textContent = activeView === "favorites"
        ? "还没有收藏的岗位，回到全部岗位里收藏几个感兴趣的机会吧。"
        : "没有匹配的岗位，换一个筛选条件试试。";
      els.resultCount.textContent = filtered.length > MAX_RENDERED_JOBS
        ? `正在显示前 ${MAX_RENDERED_JOBS} 个岗位，共 ${filtered.length} 个匹配结果`
        : `正在显示 ${filtered.length} 个岗位`;

      visibleJobs.forEach((job) => {
        const tr = document.createElement("tr");
        tr.tabIndex = 0;
        tr.innerHTML = `
          <td>
            <div class="company">${job.company}</div>
            <div class="muted">${job.nature}</div>
          </td>
          <td>
            <div class="role">${job.role}</div>
            <div class="tagline">${makeTags(job)}</div>
          </td>
          <td>${job.city}</td>
          <td>
            <div>${job.degree}</div>
            <div class="muted">${job.major}</div>
          </td>
          <td>
            <div>${job.deadline}</div>
            <div style="margin-top: 8px;">${makeStatus(job.status)}</div>
          </td>
          <td>
            <div class="row-actions">
              <button class="${favoriteClass(job)}" type="button" data-favorite-id="${getJobKey(job)}">${favoriteLabel(job)}</button>
              <a class="apply" href="${job.link}" target="_blank" rel="noopener noreferrer" onclick="event.stopPropagation()">官方投递</a>
            </div>
          </td>
        `;
        tr.addEventListener("click", () => openJob(job));
        tr.addEventListener("keydown", (event) => {
          if (event.key === "Enter") openJob(job);
        });
        tr.querySelector("[data-favorite-id]").addEventListener("click", (event) => {
          event.stopPropagation();
          toggleFavorite(job);
        });
        els.jobsBody.appendChild(tr);

        const card = document.createElement("article");
        card.className = "job-card";
        card.tabIndex = 0;
        card.innerHTML = `
          <div class="card-head">
            <div>
              <div class="company">${job.company}</div>
              <div class="role">${job.role}</div>
            </div>
            ${makeStatus(job.status)}
          </div>
          <div class="muted">${job.city} · ${job.degree} · ${job.major}</div>
          <div class="tagline">${makeTags(job)}</div>
          <div class="card-actions">
            <span class="muted">截止 ${job.deadline}</span>
            <div class="card-buttons">
              <button class="${favoriteClass(job)}" type="button" data-favorite-id="${getJobKey(job)}">${favoriteLabel(job)}</button>
              <a class="apply" href="${job.link}" target="_blank" rel="noopener noreferrer" onclick="event.stopPropagation()">官方投递</a>
            </div>
          </div>
        `;
        card.addEventListener("click", () => openJob(job));
        card.addEventListener("keydown", (event) => {
          if (event.key === "Enter") openJob(job);
        });
        card.querySelector("[data-favorite-id]").addEventListener("click", (event) => {
          event.stopPropagation();
          toggleFavorite(job);
        });
        els.mobileList.appendChild(card);
      });
    }

    function setList(list, values) {
      list.innerHTML = values.map((value) => `<li>${value}</li>`).join("");
    }

    function updateModalFavorite(job) {
      els.modalFavorite.textContent = favoriteLabel(job);
      els.modalFavorite.className = favoriteClass(job);
      els.modalFavorite.onclick = () => toggleFavorite(job);
    }

    function openJob(job) {
      els.modalCompany.textContent = job.company;
      els.modalRole.textContent = job.role;
      els.modalTags.innerHTML = `${makeStatus(job.status)}${makeTags(job)}`;
      els.modalDetails.innerHTML = [
        ["工作地点", job.city],
        ["企业性质", job.nature],
        ["岗位类型", job.type],
        ["学历要求", job.degree],
        ["专业要求", job.major],
        ["招聘对象", job.target],
        ["截止时间", job.deadline],
        ["更新时间", job.updated],
        ["投递状态", job.status]
      ].map(([label, value]) => `
        <div class="detail">
          <span>${label}</span>
          <strong>${value}</strong>
        </div>
      `).join("");
      setList(els.modalResponsibilities, job.responsibilities);
      setList(els.modalRequirements, job.requirements);
      els.modalSalary.textContent = job.salary;
      els.modalSource.textContent = `${job.source}，最后更新时间：${job.updated}`;
      els.modalApply.href = job.link;
      updateModalFavorite(job);
      els.dialog.showModal();
    }

    function closeJob() {
      els.dialog.close();
    }

    function resetFilters() {
      els.keyword.value = "";
      filterFields.forEach((field) => {
        els[field].value = "";
      });
      renderJobs();
    }

    function rebuildFilters() {
      fillSelect(els.city, uniqueValues("city"));
      fillSelect(els.nature, uniqueValues("nature"));
      fillSelect(els.type, uniqueValues("type"));
      fillSelect(els.degree, uniqueValues("degree"));
      fillSelect(els.status, uniqueValues("status"));

      els.metricTotal.textContent = jobs.length;
      els.metricOpen.textContent = jobs.filter((job) => job.status === "可投递").length;
      els.metricSoon.textContent = jobs.filter((job) => job.status === "即将截止").length;
      updateFavoriteCount();
    }

    async function init() {
      els.keyword.addEventListener("input", renderJobs);
      filterFields.forEach((field) => els[field].addEventListener("change", renderJobs));
      els.resetFilters.addEventListener("click", resetFilters);
      els.allJobsView.addEventListener("click", () => setActiveView("all"));
      els.favoritesView.addEventListener("click", () => setActiveView("favorites"));
      els.closeDialog.addEventListener("click", closeJob);
      els.closeFooter.addEventListener("click", closeJob);
      els.dialog.addEventListener("click", (event) => {
        if (event.target === els.dialog) closeJob();
      });

      await loadExternalJobs();
      rebuildFilters();
      renderJobs();
    }

    init();
  </script>
